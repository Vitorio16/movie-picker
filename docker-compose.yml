services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-movie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-movie_picker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-movie} -d ${POSTGRES_DB:-movie_picker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER:-movie}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-movie_picker}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
